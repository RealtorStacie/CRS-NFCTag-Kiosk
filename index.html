<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stacie Duffy - CRS Kiosk</title>
    <style>
        * { box-sizing: border-box; }
        :root { --crs-blue: #00B6ED; --crs-navy: #002244; --crs-gold: #C5A059; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; background-color: var(--crs-navy); 
        }
        
        .screen { 
            position: absolute; width: 100%; height: 100%; 
            background-size: 100% 100%; background-position: center;
            background-repeat: no-repeat;
            display: none; flex-direction: column; align-items: center;
        }
        .active { display: flex; }

        .hit-zone {
            background: rgba(255, 255, 255, 0); 
            border: none; cursor: pointer; position: absolute;
        }

        /* Hit Zone Coordinates */
        #startBtn { top: 10%; left: 45%; width: 20%; height: 10%; }
        #doneStep1Btn { bottom: 8%; width: 35%; height: 12%; }
        #contactChoice { top: 43%; left: 8%; width: 35%; height: 15%; }
        #urlChoice { top: 43%; right: 8%; width: 35%; height: 15%; }
        #writeBtn { bottom: 4%; width: 68%; height: 13%; border-radius: 20px; }
        #thanksBtn { bottom: 42%; left: 14%; width: 35%; height: 13%; }
        #restartBtn { bottom: 53%; right: 18%; width: 32%; height: 8%; }

        .form-container { 
            position: absolute; top: 22%; width: 62%; height: 48%;
            display: flex; flex-direction: column; gap: 1vh; justify-content: center;
        }
        input, textarea { 
            padding: 1.5vh; border-radius: 6px; border: 1px solid #ccc; 
            font-size: 1.8vh; width: 100%; background: white;
        }
        textarea { height: 10vh; resize: none; }
        .char-counter { font-size: 1.2vh; color: #333; text-align: right; margin-top: -5px; }

        #nfcModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,34,68,0.95); color: white;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }
    </style>
</head>
<body>

    <div id="screen1" class="screen active" style="background-image: url('bg_start.png');">
        <button id="startBtn" class="hit-zone" onclick="nextScreen(2)"></button>
    </div>

    <div id="screen2" class="screen" style="background-image: url('bg_handshake.png');">
        <button id="doneStep1Btn" class="hit-zone" onclick="nextScreen(3)"></button>
    </div>

        <button id="contactChoice" class="hit-zone" onclick="showForm('contact')"></button>
