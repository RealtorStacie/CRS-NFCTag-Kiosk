<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stacie Duffy - CRS Kiosk</title>
    <style>
        * { box-sizing: border-box; }
        :root { --crs-blue: #00B6ED; --crs-navy: #002244; --crs-gold: #C5A059; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background-color: var(--crs-navy); }
        
        .screen { 
            position: absolute; width: 100%; height: 100%; 
            background-size: 100% 100%; background-position: center; 
            background-repeat: no-repeat; display: none; 
            flex-direction: column; align-items: center; 
        }
        .active { display: flex; }
        
        /* Transparent Hit Zones */
        .hit-zone { background: rgba(255, 255, 255, 0); border: none; cursor: pointer; position: absolute; z-index: 10; }

        /* Global Reset (Shield) - ONLY on Screens 2, 3, 4, 5 */
        .global-reset { top: 0; left: 0; width: 18%; height: 20%; z-index: 50; }

        /* SCREEN 1: Massive Start Button for S10e */
        #startBtn { top: 5%; left: 25%; width: 50%; height: 25%; z-index: 100; }

        /* Navigation Buttons */
        #doneStep1Btn { bottom: 8%; left: 32%; width: 36%; height: 12%; }
        #contactChoice { top: 43%; left: 8%; width: 35%; height: 16%; }
        #urlChoice { top: 43%; right: 8%; width: 35%; height: 16%; }
        #writeBtn { bottom: 4%; left: 16%; width: 68%; height: 13%; border-radius: 20px; }
        
        /* Confirmation Screen Buttons */
        #thanksBtn { bottom: 40%; left: 14%; width: 36%; height: 15%; }
        #restartBtn { bottom: 50%; right: 15%; width: 36%; height: 15%; }

        /* Form Styling */
        .form-container { position: absolute; top: 22%; width: 62%; height: 48%; display: flex; flex-direction: column; gap: 1vh; justify-content: center; }
        input, textarea { padding: 1.5vh; border-radius: 6px; border: 1px solid #ccc; font-size: 1.8vh; width: 100%; background: white; color: #333; }
        textarea { height: 10vh; resize: none; }
        .char-counter { font-size: 1.2vh; color: #333; text-align: right; margin-top: -5px; }

        /* Modal Overlay */
        #nfcModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,34,68,0.95); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
    </style>
</head>
<body>

    <div id="screen1" class="screen active" style="background-image: url('bg_start.png');">
        <button id="startBtn" class="hit-zone" onclick="nextScreen(2)"></button>
    </div>

    <div id="screen2" class="screen" style="background-image: url('bg_handshake.png');">
        <button class="hit-zone global-reset" onclick="resetKiosk()"></button>
        <button id="doneStep1Btn" class="hit-zone" onclick="nextScreen(3)"></button>
    </div>

    <div id="screen3" class="screen" style="background-image: url('bg_choice.png');">
        <button class="hit-zone global-reset" onclick="resetKiosk()"></button>
        <button id="contactChoice" class="hit-zone" onclick="showForm('contact')"></button>
        <button id="urlChoice" class="hit-zone" onclick="showForm('url')"></button>
    </div>

    <div id="screen4" class="screen" style="background-image: url('bg_form.png');">
        <button class="hit-zone global-reset" onclick="resetKiosk()"></button>
        <div id="contactFields" class="form-container">
            <input type="text" id="fn" placeholder="First & Last Name">
            <input type="tel" id="tel" placeholder="Cell Phone Number (Required)">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="city" placeholder="City">
            <input type="text" id="state" placeholder="State">
            <textarea id="notes" placeholder="Niche and/or Top 3 Areas Served" maxlength="150"></textarea>
            <div id="charCount" class="char-counter">150 chars remaining</div>
        </div>
        <div id="urlFields" class="form-container" style="display:none;">
            <p style="color:white; text-align:center; margin-bottom: 5px;">Lead Tracking for Website Link</p>
            <input type="text" id="urlName" placeholder="Name">
            <input type="url" id="urlInput" placeholder="https://yourwebsite.com" maxlength="100">
        </div>
        <button id="writeBtn" class="hit-zone" onclick="initiateWrite()"></button>
    </div>

    <div id="screen5" class="screen" style="background-image: url('bg_confirmation.png');">
        <button class="hit-zone global-reset" onclick="resetKiosk()"></button>
        <button id="thanksBtn" class="hit-zone" onclick="resetKiosk()"></button>
        <button id="restartBtn" class="hit-zone" onclick="resetKiosk()"></button>
    </div>

    <div id="nfcModal">
        <h2 id="modalText">📡 PREPARING...</h2>
        <p id="modalSubtext">Stand by while we sync your data.</p>
    </div>

    <script>
        let currentMode = 'contact';
        const notesInput = document.getElementById('notes');
        const charDisplay = document.getElementById('charCount');
        
        notesInput.addEventListener('input', () => {
            const remaining = 150 - notesInput.value.length;
            charDisplay.innerText = `${remaining} chars remaining`;
            charDisplay.style.color = remaining < 15 ? 'red' : '#333';
        });

        function nextScreen(num) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen' + num).classList.add('active');
        }

        function showForm(mode) {
            currentMode = mode;
            document.getElementById('contactFields').style.display = mode === 'contact' ? 'flex' : 'none';
            document.getElementById('urlFields').style.display = mode === 'url' ? 'flex' : 'none';
            nextScreen(4);
        }

        async function initiateWrite() {
            if (!('NDEFReader' in window)) {
                alert("NFC not supported. Use Chrome on Android.");
                return;
            }

            // Validations
            if (currentMode === 'contact') {
                if (!document.getElementById('tel').value.trim()) {
                    alert("Please enter a phone number.");
                    return;
                }
            } else {
                if (!document.getElementById('urlInput').value.trim()) {
                    alert("Please enter a website URL.");
                    return;
                }
            }
            
            const modal = document.getElementById('nfcModal');
            const modalText = document.getElementById('modalText');
            modal.style.display = 'flex';

            try {
                const scriptURL = 'https://script.google.com/macros/s/AKfycbyVlJhEYXiHDLAy7fJYdHzigIyYfv47Kiu5U6RAx5FNkgq2HzmbK9qA0VzwZZPe0NWfIA/exec';

                // CREATE DATA PAYLOAD BASED ON MODE
                const fields = { 'mode': currentMode };

                if (currentMode === 'contact') {
                    fields.fn = document.getElementById('fn').value.trim();
                    fields.tel = document.getElementById('tel').value.trim();
                    fields.email = document.getElementById('email').value.trim();
                    fields.city = document.getElementById('city').value.trim();
                    fields.state = document.getElementById('state').value.trim();
                    fields.notes = document.getElementById('notes').value.trim();
                } else {
                    fields.fn = document.getElementById('urlName').value.trim();
                    fields.targetUrl = document.getElementById('urlInput').value.trim();
                }

                // SUBMIT TO GOOGLE VIA HIDDEN FORM
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = scriptURL;
                form.target = 'hidden_iframe';

                for (const key in fields) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = fields[key];
                    form.appendChild(input);
                }

                let iframe = document.getElementById('hidden_iframe');
                if (!iframe) {
                    iframe = document.createElement('iframe');
                    iframe.id = 'hidden_iframe';
                    iframe.name = 'hidden_iframe';
                    iframe.style.display = 'none';
                    document.body.appendChild(iframe);
                }

                document.body.appendChild(form);
                form.submit();

                modalText.innerText = "📡 Tap and Hold the Tag to the NFC Reader";
                await new Promise(r => setTimeout(r, 1500));

                // NFC WRITE LOGIC
                const ndef = new NDEFReader();
                await ndef.scan();
                
                let writeData = "";
                if (currentMode === 'contact') {
                    const cleanTel = fields.tel.replace(/\D/g,'');
                    writeData = "https://RealtorStacie.github.io/CRS-NFCTag-Kiosk/vcf/" + cleanTel + ".vcf";
                } else {
                    writeData = fields.targetUrl;
                }

                await ndef.write({
                    records: [{ recordType: "url", data: writeData }]
                });
                
                modal.style.display = 'none';
                nextScreen(5);

            } catch (error) {
                console.error(error);
                document.getElementById('modalText').innerText = "❌ ERROR";
                setTimeout(() => { modal.style.display = 'none'; }, 4000);
            }
        }

        function resetKiosk() {
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
            charDisplay.innerText = "150 chars remaining";
            nextScreen(1);
        }
    </script>
</body>
</html>
